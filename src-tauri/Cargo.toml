[package]
name = "aurora"
version = "0.1.0"
description = "Aurora - AI-Powered Agentic Code Editor"
authors = ["Aurora Team"]
edition = "2021"

[lib]
name = "aurora_lib"
crate-type = ["lib", "cdylib", "staticlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = ["protocol-asset", "tray-icon"] }
tauri-plugin-shell = "2"
tauri-plugin-fs = "2"
tauri-plugin-dialog = "2"
tauri-plugin-process = "2"
tauri-plugin-os = "2"
tauri-plugin-clipboard-manager = "2"
serde = { version = "1", features = ["derive"] }
reqwest = { version = "0.12", features = ["json", "stream"] }
futures-util = "0.3"
serde_json = "1"
tokio = { version = "1", features = ["full"] }
hostname = "0.4"
notify = "6"
grep = "0.3"
grep-regex = "0.1"
grep-searcher = "0.1"

# Database dependencies
rusqlite = { version = "0.38.0", features = ["bundled", "serde_json"] }
time = { version = "0.3", features = ["serde", "formatting"] }
uuid = { version = "1.0", features = ["v4", "serde"] }
thiserror = "1.0"
chrono = { version = "0.4", features = ["serde"] }

# Diff library for comparing file changes
similar = "2"

# PTY support for native terminal
tauri-plugin-pty = "0.1"

# Dev profile: enable some optimizations for better dev mode performance
[profile.dev]
opt-level = 1

[profile.dev.package."*"]
opt-level = 2

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true

