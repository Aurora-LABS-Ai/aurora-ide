name: Release

# Auto-builds and publishes a Windows installer when a `v*` tag is
# pushed. The single source of truth for the app version is
# `package.json`; `tauri.conf.json` reads `"../package.json"`, so
# bumping the package + pushing a matching tag is the whole release
# ritual:
#
#   1. Bump `package.json` (`version: "2.0.0"`).
#   2. Commit, push to main.
#   3. `git tag v2.0.0 && git push origin v2.0.0`.
#
# The action fetches ONNX Runtime CPU DLLs, builds the CPU-only
# bundle, and publishes a non-draft release with the .msi/.exe
# installers attached. `workflow_dispatch` is also exposed so a
# maintainer can trigger a manual build from the Actions tab without
# pushing a tag.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v2.0.0). Optional when re-running for an existing tag."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  publish-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Manual dispatch can target an arbitrary ref. When no tag
          # is supplied we fall back to whatever ref the workflow
          # was launched against (usually `main`).
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - run: pnpm install --frozen-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Fetch ONNX Runtime CPU DLLs into `src-tauri/runtime/onnxruntime/`.
      # The bundle's `resources` glob picks them up at build time; the
      # DLLs themselves aren't checked in (each developer / CI run
      # populates the dir lazily — see `.gitignore`). Defaults to a
      # pinned win-x64 CPU build, no DirectML / CUDA — matches the
      # default Cargo feature set (`cpu-only`).
      - name: Fetch ONNX Runtime (CPU)
        shell: pwsh
        run: node scripts/setup-onnxruntime.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          # `__VERSION__` is replaced by tauri-action with the
          # version resolved from `tauri.conf.json` (which itself
          # reads from `../package.json` — see version single-source
          # chain).
          tagName: v__VERSION__
          releaseName: "Aurora v__VERSION__"
          releaseBody: |
            Aurora v__VERSION__ — Windows installer (CPU-only build).

            **What's in the box:**
            - `.msi` and `.exe` installers below.
            - CPU-only ONNX Runtime for semantic search; no GPU drivers required.
            - Self-contained bundle (Webview2 bootstrapper, ONNX DLLs, app binary).

            **Install:** download the `.msi` (recommended) or `.exe`, run it, follow the wizard.
            **Requires:** Windows 10/11 x64.

            Built automatically from the `v__VERSION__` tag via the `Release` workflow.
          # Auto-publish — no manual "publish draft" step needed.
          releaseDraft: false
          prerelease: false
          # `Cargo.toml` already sets `default = ["cpu-only"]`, so a
          # plain `tauri build` produces a CPU-only bundle. No extra
          # feature flags needed — opt-in to CUDA via the dedicated
          # `pnpm tauri:build:cuda` script (uses --features cuda).
