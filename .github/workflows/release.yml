name: Release

# Windows-only release. Tag first: git tag v1.0.0 && git push origin v1.0.0
# App version in tauri.conf.json / Cargo.toml must match (v__VERSION__ → 1.0.0).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - run: pnpm install --frozen-lockfile

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Fetch ONNX Runtime CPU DLLs into `src-tauri/runtime/onnxruntime/`.
      # The bundle's `resources` glob picks them up at build time; the
      # DLLs themselves aren't checked in (each developer / CI run
      # populates the dir lazily — see `.gitignore`). Defaults to a
      # pinned win-x64 CPU build, no DirectML / CUDA — matches the
      # default Cargo feature set (`cpu-only`).
      - name: Fetch ONNX Runtime (CPU)
        shell: pwsh
        run: node scripts/setup-onnxruntime.mjs

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: src-tauri
          tagName: v__VERSION__
          releaseName: "Aurora v__VERSION__"
          releaseBody: "Windows installer (CPU-only semantic search). Download the bundle below."
          releaseDraft: true
          prerelease: false
          # `Cargo.toml` already sets `default = ["cpu-only"]`, so a
          # plain `tauri build` produces a CPU-only bundle. No extra
          # feature flags needed — opt-in to CUDA via the dedicated
          # `pnpm tauri:build:cuda` script (uses --features cuda).
